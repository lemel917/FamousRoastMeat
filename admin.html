<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>名門燒臘｜後台管理</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="sync-banner" hidden>賣完狀態同步中，請稍候⋯</div>

  <section id="login-view" class="login-card" hidden>
    <h1>名門燒臘 後台</h1>
    <form id="login-form">
      <label>帳號
        <input id="login-user" autocomplete="username" required>
      </label>
      <label>密碼
        <input id="login-pass" type="password" autocomplete="current-password" required>
      </label>
      <p id="login-error" class="error" hidden>帳號或密碼錯誤</p>
      <button type="submit">登入</button>
    </form>
  </section>

  <section id="admin-view" hidden>
    <header class="admin-header">
      <h1>品項供應管理</h1>
      <div class="admin-actions">
        <button id="restore-all">全部恢復供應</button>
        <button id="logout" class="ghost">登出</button>
      </div>
    </header>
    <main id="admin-root"></main>
  </section>

  <script src="menu-data.js"></script>
  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
